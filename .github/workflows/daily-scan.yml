name: Daily scan

on:
  schedule:
    # 22:00 UTC Mon-Fri ≈ after each weekday's US close; captures KR + US.
    # (Weekdays only — no trading on weekends.)
    - cron: "0 22 * * 1-5"
  workflow_dispatch:
    inputs:
      markets:
        description: "Markets to scan (space-separated: KR US)"
        default: "KR US"
      types:
        description: "Security types (space-separated)"
        default: "common etf etn spac preferred warrant_unit fund"
      min_drop:
        description: "Min %% drop from 5y high"
        default: "50"

permissions:
  contents: write

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Guard the frozen, backtest-validated weights + pipeline invariants
      # BEFORE scanning: a broken registry/weight revert should fail the job
      # (and fire the dead-man ping) instead of publishing a bad snapshot.
      - name: Selftest (validated config regression guard)
        env:
          PYTHONUTF8: "1"
        run: python scripts/selftest.py

      # Persist the SQLite cache between runs. NOTE: actions/cache@v4 does NOT
      # re-save on an exact primary-key hit, so a fixed key froze the DB at its
      # first save (2026-06-23) — cooldown/alert history was silently discarded
      # every run. Split restore/save with a per-run key + always-save: each run
      # starts from the newest cache (restore-keys prefix match) and saves its
      # own updated copy. Prices still refetch daily by design (max_age 1d);
      # what must persist is cooldown state + 80-day fundamentals + universe.
      - name: Restore price cache
        uses: actions/cache/restore@v4
        with:
          path: data/screener.db
          key: screener-db-${{ github.run_id }}
          restore-keys: |
            screener-db-

      - name: Run daily scan
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # KR fundamentals/valuation come from DART; without this repo secret the
          # KR enrichment sidecars are unavailable-only (fail-soft). US uses yfinance.
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          # hosted dashboard link appended to the alert (repo variable, optional)
          APP_URL: ${{ vars.APP_URL }}
          PYTHONUTF8: "1"
          # dispatch inputs via env (not inline ${{ }} interpolation into the
          # script) so shell metacharacters in an input can't inject commands
          # into a step that holds secrets
          IN_MARKETS: ${{ github.event.inputs.markets || 'KR US' }}
          IN_TYPES: ${{ github.event.inputs.types || 'common etf etn spac preferred warrant_unit fund' }}
          IN_MIN_DROP: ${{ github.event.inputs.min_drop || '50' }}
        run: |
          python scripts/daily_scan.py \
            --markets $IN_MARKETS \
            --types $IN_TYPES \
            --min-drop "$IN_MIN_DROP"

      # Save even on failure/timeout: partial fetch progress + cooldown state
      # from a broken run still shortens the next run.
      - name: Save price cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/screener.db
          key: screener-db-${{ github.run_id }}

      - name: Publish snapshot to data branch
        run: |
          test -f data/candidates.parquet || { echo "no snapshot produced"; exit 1; }
          cp data/candidates.parquet "$RUNNER_TEMP/candidates.parquet"
          # sidecars are optional — stage each only if it was produced
          for f in benchmarks valuations fundamentals; do
            cp "data/$f.parquet" "$RUNNER_TEMP/$f.parquet" 2>/dev/null || true
          done
          cp data/health.json "$RUNNER_TEMP/health.json" 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan data
          git rm -rf . >/dev/null 2>&1 || true
          cp "$RUNNER_TEMP/candidates.parquet" candidates.parquet
          git add candidates.parquet
          for f in benchmarks valuations fundamentals; do
            if [ -f "$RUNNER_TEMP/$f.parquet" ]; then
              cp "$RUNNER_TEMP/$f.parquet" "$f.parquet"
              git add "$f.parquet"
            fi
          done
          if [ -f "$RUNNER_TEMP/health.json" ]; then
            cp "$RUNNER_TEMP/health.json" health.json
            git add health.json
          fi
          git commit -m "snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push -f origin data

      # Dead-man-switch: a scheduled run can fail silently (cron disabled, secret
      # expired, dependency break). Ping Telegram on any failure so a stalled
      # pipeline is noticed instead of just going quiet.
      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              --data-urlencode "chat_id=$TELEGRAM_CHAT_ID" \
              --data-urlencode "text=⚠️ 폭락주 일일 스캔 실패 — $url" >/dev/null || true
          fi
