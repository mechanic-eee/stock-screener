name: Daily scan

on:
  schedule:
    # 22:00 UTC Mon-Fri ≈ after each weekday's US close; captures KR + US.
    # (Weekdays only — no trading on weekends.)
    - cron: "0 22 * * 1-5"
  workflow_dispatch:
    inputs:
      markets:
        description: "Markets to scan (space-separated: KR US)"
        default: "KR US"
      types:
        description: "Security types (space-separated)"
        default: "common etf etn spac preferred warrant_unit fund"
      min_drop:
        description: "Min %% drop from 5y high"
        default: "50"

permissions:
  contents: write

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Persist the SQLite price cache between runs so we don't refetch
      # everything from scratch each day.
      # Fixed key so the cache actually hits day-to-day. A run_id key never
      # exact-matches, so every run was a cache miss -> full refetch (the cause
      # of the 8min vs 1h11m runtime swing). actions/cache still updates the
      # entry at job end, so the DB stays fresh.
      - name: Restore price cache
        uses: actions/cache@v4
        with:
          path: data/screener.db
          key: screener-db-v1
          restore-keys: |
            screener-db-

      - name: Run daily scan
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # KR fundamentals/valuation come from DART; without this repo secret the
          # KR enrichment sidecars are unavailable-only (fail-soft). US uses yfinance.
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          PYTHONUTF8: "1"
        run: |
          python scripts/daily_scan.py \
            --markets ${{ github.event.inputs.markets || 'KR US' }} \
            --types ${{ github.event.inputs.types || 'common etf etn spac preferred warrant_unit fund' }} \
            --min-drop ${{ github.event.inputs.min_drop || '50' }}

      - name: Publish snapshot to data branch
        run: |
          test -f data/candidates.parquet || { echo "no snapshot produced"; exit 1; }
          cp data/candidates.parquet "$RUNNER_TEMP/candidates.parquet"
          # sidecars are optional — stage each only if it was produced
          for f in benchmarks valuations fundamentals; do
            cp "data/$f.parquet" "$RUNNER_TEMP/$f.parquet" 2>/dev/null || true
          done
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan data
          git rm -rf . >/dev/null 2>&1 || true
          cp "$RUNNER_TEMP/candidates.parquet" candidates.parquet
          git add candidates.parquet
          for f in benchmarks valuations fundamentals; do
            if [ -f "$RUNNER_TEMP/$f.parquet" ]; then
              cp "$RUNNER_TEMP/$f.parquet" "$f.parquet"
              git add "$f.parquet"
            fi
          done
          git commit -m "snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push -f origin data
