name: Daily scan

on:
  schedule:
    # 22:00 UTC ≈ after US market close; captures KR + US prior-day closes.
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      markets:
        description: "Markets to scan (space-separated: KR US)"
        default: "KR US"
      min_drop:
        description: "Min %% drop from 5y high"
        default: "80"

permissions:
  contents: write

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Persist the SQLite price cache between runs so we don't refetch
      # everything from scratch each day.
      - name: Restore price cache
        uses: actions/cache@v4
        with:
          path: data/screener.db
          key: screener-db-${{ github.run_id }}
          restore-keys: |
            screener-db-

      - name: Run daily scan
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONUTF8: "1"
        run: |
          python scripts/daily_scan.py \
            --markets ${{ github.event.inputs.markets || 'KR US' }} \
            --min-drop ${{ github.event.inputs.min_drop || '80' }}

      - name: Publish snapshot to data branch
        run: |
          test -f data/candidates.parquet || { echo "no snapshot produced"; exit 1; }
          cp data/candidates.parquet "$RUNNER_TEMP/candidates.parquet"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan data
          git rm -rf . >/dev/null 2>&1 || true
          cp "$RUNNER_TEMP/candidates.parquet" candidates.parquet
          git add candidates.parquet
          git commit -m "snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push -f origin data
